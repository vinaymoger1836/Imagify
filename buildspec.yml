version: 0.2

env:
  variables:
    VITE_API_URL: "http://ec2-54-166-222-14.compute-1.amazonaws.com/api"
    VITE_COGNITO_USER_POOL_ID: "us-east-1_Gkon7tum6"
    VITE_COGNITO_CLIENT_ID: "7ctfdoq4bmcrkgnfofnovh1a2g"
    REGION: "us-east-1"
    FRONTEND_BUCKET: "imagify-frontend"
    LAMBDA_FUNCTION: "imagify-image-processor"
    EC2_INSTANCE_ID: ""

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - cd frontend && npm ci && cd ..
      - cd lambda/image-processor && npm ci && cd ../..

  build:
    commands:
      - cd frontend && npm run build && cd ..
      - cd lambda/image-processor && zip -j ../../imagify-processor.zip index.js rekognition.js dynamodb.js && cd ../..

  post_build:
    commands:
      # Deploy frontend to S3
      - aws s3 sync frontend/dist s3://$FRONTEND_BUCKET --delete --region $REGION

      # Deploy Lambda
      - aws lambda update-function-code --function-name $LAMBDA_FUNCTION --zip-file fileb://imagify-processor.zip --region $REGION

      # Deploy backend on EC2 via SSM (EC2_INSTANCE_ID set in CodeBuild env vars)
      - |
        echo "Deploying to EC2 instance: $EC2_INSTANCE_ID"
        aws ssm send-command \
          --instance-ids "$EC2_INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["cd /home/ec2-user/Imagify/backend && git pull && npm ci --omit=dev && pm2 restart imagify-backend"]' \
          --region $REGION

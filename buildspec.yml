version: 0.2

env:
  variables:
    # VITE_API_URL injected from CodeBuild environment variable (not stored in repo)
    VITE_COGNITO_USER_POOL_ID: "us-east-1_Gkon7tum6"
    VITE_COGNITO_CLIENT_ID: "7ctfdoq4bmcrkgnfofnovh1a2g"
    VITE_CDN_URL: "https://d42cq1u765phf.cloudfront.net"
    REGION: "us-east-1"
    FRONTEND_BUCKET: "imagify-frontend"
    LAMBDA_FUNCTION: "imagify-image-processor"
    EC2_INSTANCE_ID: "i-026a5d2e50501b7aa"

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - cd frontend && npm ci && cd ..
      - cd lambda/image-processor && npm install && cd ../..

  build:
    commands:
      - cd frontend && npm run build && cd ..
      - cd lambda/image-processor && zip -r ../../imagify-processor.zip . -x "node_modules/@aws-sdk/*" -x "node_modules/@smithy/*" && cd ../..

  post_build:
    commands:
      # Deploy frontend to S3
      - aws s3 sync frontend/dist s3://$FRONTEND_BUCKET --delete --region $REGION

      # Deploy Lambda
      - aws lambda update-function-code --function-name $LAMBDA_FUNCTION --zip-file fileb://imagify-processor.zip --region $REGION

      # Deploy backend on EC2 via SSM
      - |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "$EC2_INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["runuser -l ec2-user -c \"export PATH=/usr/local/bin:/usr/bin:/bin:$PATH && cd /home/ec2-user/Imagify/backend && git pull && npm ci --omit=dev && pm2 restart imagify-backend\""]' \
          --region $REGION \
          --query "Command.CommandId" \
          --output text)
        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "$EC2_INSTANCE_ID" \
          --region $REGION || DEPLOY_FAILED=1
        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "$EC2_INSTANCE_ID" \
          --region $REGION \
          --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
          --output table
        [ -z "$DEPLOY_FAILED" ] || exit 1
